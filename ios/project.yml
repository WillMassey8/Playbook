name: Playbook
options:
  bundleIdPrefix: com.playbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: YOUR_TEAM_ID

targets:
  Playbook:
    type: application
    platform: iOS
    sources:
      - path: Playbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playbook.app
        INFOPLIST_FILE: Playbook/Info.plist
        CODE_SIGN_ENTITLEMENTS: Playbook/Playbook.entitlements
    dependencies:
      - package: Supabase
        product: Supabase
      - target: PlaybookShareExtension
        embed: true
    info:
      path: Playbook/Info.plist
      properties:
        CFBundleDisplayName: Playbook AI
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - playbook
        LSApplicationQueriesSchemes:
          - twitter
          - x
          - instagram
        SUPABASE_URL: https://riwjijzjqfdsfocnzria.supabase.co
        SUPABASE_ANON_KEY: sb_publishable_dDyrNmILRObvGMTsDTLb2g_uj94nVXj

  PlaybookShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PlaybookShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playbook.app.share
        INFOPLIST_FILE: PlaybookShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: PlaybookShareExtension/PlaybookShareExtension.entitlements
    info:
      path: PlaybookShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Playbook AI
        SUPABASE_URL: https://riwjijzjqfdsfocnzria.supabase.co
        SUPABASE_ANON_KEY: sb_publishable_dDyrNmILRObvGMTsDTLb2g_uj94nVXj

schemes:
  Playbook:
    build:
      targets:
        Playbook: all
        PlaybookShareExtension: all
    run:
      config: Debug
